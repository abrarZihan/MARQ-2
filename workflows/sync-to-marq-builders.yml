name: Sync to MARQ-Builders

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MARQ-2
        uses: actions/checkout@v3

      - name: Clone MARQ-Builders
        run: |
          git clone https://${{ secrets.MARQ_BUILDERS_PAT }}@github.com/abrarZihan/MARQ-Builders-.git marq-builders-temp

      - name: Sync files
        run: |
          rsync -av --delete ./ marq-builders-temp/ --exclude=.git --exclude=.github

      - name: Push to MARQ-Builders
        run: |
          cd marq-builders-temp
          git config user.email 'action@github.com'
          git config user.name 'GitHub Action'
          git add .
          git commit -m 'Automated sync from MARQ-2' || echo 'No changes to commit'
          git push origin main
